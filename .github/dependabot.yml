version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Seoul
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      workspace-tooling:
        dependency-type: development
        patterns:
          - '@eslint/*'
          - eslint
          - eslint-*
          - globals
          - prettier
          - turbo
          - typescript
          - typescript-eslint
          - jest
          - supertest
          - ts-jest
          - ts-loader
          - ts-node
          - tsconfig-paths
          - '@types/*'
          - expo-doctor
          - ts-patch
      api-runtime:
        dependency-type: production
        patterns:
          - '@nestjs/*'
          - reflect-metadata
          - rxjs
      prisma-stack:
        patterns:
          - prisma
          - '@prisma/*'
          - dotenv
      validation-stack:
        patterns:
          - typia
          - valibot
    ignore:
      - dependency-name: expo
      - dependency-name: expo-status-bar
      - dependency-name: expo-*
      - dependency-name: react
      - dependency-name: react-dom
      - dependency-name: react-native
      - dependency-name: react-native-safe-area-context
      - dependency-name: react-native-*

  - package-ecosystem: docker-compose
    directory: '/'
    schedule:
      interval: monthly
      day: monday
      time: '09:30'
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: docker
    directory: '/apps/api'
    schedule:
      interval: monthly
      day: monday
      time: '09:30'
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: chore
      include: scope
